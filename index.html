<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Cali Lab</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@400;500;600;700&display=swap');

:root{
  --void: #0A0818;
  --night: #14102B;
  --night-deep: #1E1640;
  --ink: #F0EAFF;
  --ink-soft: #B8A8E0;
  --ink-dim: #7868A8;
  --gold: #E8C766;
  --gold-bright: #FFE9A8;
  --gold-dim: #9C8348;
  --line: #3D3168;
  --gem0: #8441C7;
  --gem1: #4184C7;
}

*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
html,body{margin:0; padding:0; min-height:100%; overflow-x:hidden;}
body{
  font-family:'Noto Serif KR', serif;
  background: var(--void);
  color: var(--ink);
  position:relative;
  user-select:none;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#starfield{
  position:fixed; inset:0;
  z-index:0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(132,65,199,0.30) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 75%, rgba(65,132,199,0.25) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 100%, rgba(45,35,88,0.6) 0%, transparent 70%),
    linear-gradient(180deg, var(--void) 0%, var(--night) 45%, var(--night-deep) 100%);
}
.star{
  position:absolute;
  background: var(--gold-bright);
  border-radius:50%;
  opacity: 0.7;
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle{
  0%,100%{ opacity: 0.2; transform: scale(0.8); }
  50%{ opacity: 1; transform: scale(1.3); }
}
.shooting-star{
  position:absolute;
  width: 2px; height: 2px;
  background: var(--gold-bright);
  border-radius: 50%;
  box-shadow: 0 0 6px 1px var(--gold-bright);
  opacity: 0;
  animation: shoot 4.5s linear infinite;
}
@keyframes shoot{
  0%{ opacity: 0; transform: translate(0,0); }
  3%{ opacity: 1; }
  15%{ opacity: 0; transform: translate(-220px, 160px); }
  100%{ opacity: 0; }
}

.page{
  position:relative;
  z-index:1;
  width:100%;
  max-width: 520px;
  padding: 48px 24px 64px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.brand{
  text-align:center;
  margin-bottom: 8px;
}
.brand-mark{
  font-size: 34px;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 16px rgba(232,199,102,0.5));
}
.brand-title{
  font-family:'Nanum Myeongjo', serif;
  font-weight: 800;
  font-size: 38px;
  letter-spacing: 3px;
  color: var(--gold);
  text-shadow: 0 0 26px rgba(232,199,102,0.4);
  margin: 0 0 6px;
}
.brand-sub{
  font-size: 13.5px;
  color: var(--ink-soft);
  letter-spacing: 0.5px;
  margin-bottom: 44px;
}

.game-grid{
  width:100%;
  display:flex;
  flex-direction:column;
  gap: 20px;
}

.game-card{
  position:relative;
  display:flex;
  align-items:center;
  gap: 18px;
  width:100%;
  text-decoration:none;
  color: var(--ink);
  background: rgba(20,16,43,0.55);
  border: 1.5px solid var(--line);
  border-radius: 22px;
  padding: 22px 22px;
  overflow:hidden;
  transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
}
.game-card:active{ transform: scale(0.97); }
.game-card::before{
  content:"";
  position:absolute; inset:0;
  opacity: 0;
  transition: opacity .25s ease;
  pointer-events:none;
}
.game-card.radoku::before{
  background: radial-gradient(circle at 85% 15%, rgba(132,65,199,0.35) 0%, transparent 60%);
}
.game-card.antopia::before{
  background: radial-gradient(circle at 85% 15%, rgba(232,160,80,0.30) 0%, transparent 60%);
}
.game-card:hover::before, .game-card:active::before{ opacity:1; }

.game-card.radoku{ border-color: rgba(132,65,199,0.45); }
.game-card.antopia{ border-color: rgba(232,160,80,0.4); }
.game-card.radoku:active{ box-shadow: 0 0 28px rgba(132,65,199,0.35); }
.game-card.antopia:active{ box-shadow: 0 0 28px rgba(232,160,80,0.3); }

.game-icon{
  flex-shrink:0;
  width: 64px; height: 64px;
  border-radius: 18px;
  display:flex; align-items:center; justify-content:center;
  font-size: 32px;
  position:relative;
  z-index:1;
}
.game-card.radoku .game-icon{
  background: radial-gradient(circle at 32% 28%, #B790DE, #8441C7 55%, #4C2276 100%);
  box-shadow: 0 0 18px rgba(132,65,199,0.5);
}
.game-card.antopia .game-icon{
  background: radial-gradient(circle at 32% 28%, #FFD9A0, #F09030 55%, #B05E10 100%);
  box-shadow: 0 0 18px rgba(240,144,48,0.5);
}

.game-info{
  position:relative;
  z-index:1;
  flex:1;
  min-width:0;
}
.game-name{
  font-family:'Nanum Myeongjo', serif;
  font-weight: 800;
  font-size: 21px;
  margin: 0 0 4px;
  letter-spacing: 0.5px;
}
.game-card.radoku .game-name{ color: var(--gold-bright); }
.game-card.antopia .game-name{ color: #FFD9A0; }
.game-desc{
  font-size: 12.5px;
  color: var(--ink-soft);
  line-height: 1.5;
}
.game-arrow{
  flex-shrink:0;
  font-size: 20px;
  color: var(--ink-dim);
  position:relative;
  z-index:1;
}

.footer-note{
  margin-top: 56px;
  text-align:center;
  font-size: 11.5px;
  color: var(--ink-dim);
  letter-spacing: 0.5px;
}
.footer-note .heart{
  color: var(--gold-dim);
}

@media (prefers-reduced-motion: reduce){
  *{ animation: none !important; transition: none !important; }
}
</style>
</head>
<body>
<div id="starfield"></div>

<div class="page">
  <div class="brand">
    <div class="brand-mark">✨</div>
    <h1 class="brand-title">CALI LAB</h1>
    <div class="brand-sub">함께 만든 작은 게임들</div>
  </div>

  <div class="game-grid">
    <a class="game-card radoku" href="radoku.html">
      <div class="game-icon">🐱</div>
      <div class="game-info">
        <div class="game-name">라도쿠</div>
        <div class="game-desc">영역마다 마법 유물을 하나씩, 신비로운 별빛 퍼즐</div>
      </div>
      <div class="game-arrow">›</div>
    </a>

    <a class="game-card antopia" href="antopia.html">
      <div class="game-icon">🦜</div>
      <div class="game-info">
        <div class="game-name">앵토피아</div>
        <div class="game-desc">나만의 앵무새를 키우고 꾸미는 아기자기한 세상</div>
      </div>
      <div class="game-arrow">›</div>
    </a>
  </div>

  <div class="footer-note">Cali Lab <span class="heart">♦</span> made with love</div>
</div>

<script>
(function(){
  const field = document.getElementById('starfield');
  const starCount = 70;
  for(let i=0;i<starCount;i++){
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random()*2.2 + 1;
    s.style.width = size+'px';
    s.style.height = size+'px';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.animationDelay = (Math.random()*3)+'s';
    s.style.animationDuration = (2 + Math.random()*3)+'s';
    field.appendChild(s);
  }
  for(let i=0;i<3;i++){
    const sh = document.createElement('div');
    sh.className = 'shooting-star';
    sh.style.left = (50 + Math.random()*40)+'%';
    sh.style.top = (Math.random()*40)+'%';
    sh.style.animationDelay = (Math.random()*8)+'s';
    sh.style.animationDuration = (3.5 + Math.random()*3)+'s';
    field.appendChild(sh);
  }
})();
</script>
</body>
</html>
